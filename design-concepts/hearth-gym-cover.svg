<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844" role="img" aria-label="TrainQuest Agent Hearth Gym homepage concept">
  <defs>
    <linearGradient id="bgA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15100E"/>
      <stop offset="0.52" stop-color="#201510"/>
      <stop offset="1" stop-color="#100D0C"/>
    </linearGradient>
    <radialGradient id="lampA" cx="50%" cy="28%" r="55%">
      <stop offset="0" stop-color="#F0A64A" stop-opacity="0.34"/>
      <stop offset="0.38" stop-color="#D16A43" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#15100E" stop-opacity="0"/>
    </radialGradient>
    <filter id="softA" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <style>
      .pixel { shape-rendering: crispEdges; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
      .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
  </defs>

  <rect width="390" height="844" fill="url(#bgA)"/>
  <rect width="390" height="844" fill="url(#lampA)"/>

  <!-- phone safe stage -->
  <rect x="0" y="0" width="390" height="844" fill="none"/>

  <!-- hamburger -->
  <g transform="translate(24 28)" fill="#B89B7B" opacity="0.9">
    <rect width="18" height="2" rx="1"/>
    <rect y="7" width="18" height="2" rx="1"/>
    <rect y="14" width="18" height="2" rx="1"/>
  </g>

  <!-- wall panels -->
  <g opacity="0.42">
    <rect x="46" y="124" width="298" height="178" rx="4" fill="#211610" stroke="#3B261A"/>
    <path d="M46 180H344M46 238H344M105 124V302M164 124V302M223 124V302M282 124V302" stroke="#3B261A" stroke-width="2"/>
  </g>

  <!-- lights -->
  <g class="pixel">
    <rect x="77" y="143" width="18" height="18" fill="#F0A64A"/>
    <rect x="295" y="143" width="18" height="18" fill="#F0A64A"/>
  </g>
  <circle cx="86" cy="152" r="42" fill="#F0A64A" opacity="0.2" filter="url(#softA)"/>
  <circle cx="304" cy="152" r="42" fill="#F0A64A" opacity="0.2" filter="url(#softA)"/>

  <!-- subtle equipment silhouettes -->
  <g opacity="0.36" fill="#0D0A09">
    <rect x="70" y="286" width="72" height="7" rx="3"/>
    <rect x="84" y="272" width="10" height="28" rx="3"/>
    <rect x="120" y="272" width="10" height="28" rx="3"/>
    <rect x="246" y="278" width="72" height="8" rx="3"/>
    <circle cx="254" cy="282" r="11"/>
    <circle cx="310" cy="282" r="11"/>
  </g>

  <!-- top copy -->
  <text x="195" y="111" text-anchor="middle" class="mono" font-size="12" fill="#F0A64A" letter-spacing="1.2">夜深了，你还在</text>
  <text x="195" y="133" text-anchor="middle" class="sans" font-size="12" fill="#B89B7B">今天已经练过了，很棒</text>

  <!-- stage platform -->
  <ellipse cx="195" cy="545" rx="112" ry="20" fill="#000000" opacity="0.24"/>
  <g class="pixel">
    <rect x="99" y="488" width="192" height="28" fill="#3A2418"/>
    <rect x="115" y="462" width="160" height="28" fill="#5B3927"/>
    <rect x="131" y="446" width="128" height="18" fill="#7A4B2F"/>
    <rect x="99" y="516" width="192" height="8" fill="#120D0A"/>
    <rect x="115" y="462" width="160" height="4" fill="#D16A43" opacity="0.55"/>
  </g>

  <!-- pixel avatar -->
  <g class="pixel" transform="translate(151 238) scale(2)">
    <rect x="17" y="4" width="14" height="14" fill="#C68642"/>
    <rect x="16" y="4" width="16" height="5" fill="#2A1D16"/>
    <rect x="20" y="10" width="2" height="2" fill="#15100E"/>
    <rect x="27" y="10" width="2" height="2" fill="#15100E"/>
    <rect x="21" y="16" width="7" height="1" fill="#7C3A3A"/>
    <rect x="18" y="18" width="14" height="22" fill="#67B3A2"/>
    <rect x="14" y="20" width="4" height="20" fill="#C68642"/>
    <rect x="32" y="20" width="4" height="20" fill="#C68642"/>
    <rect x="19" y="40" width="6" height="18" fill="#1A1716"/>
    <rect x="25" y="40" width="6" height="18" fill="#1A1716"/>
    <rect x="18" y="58" width="8" height="4" fill="#2B211A"/>
    <rect x="25" y="58" width="8" height="4" fill="#2B211A"/>
  </g>

  <!-- tiny status hint -->
  <text x="195" y="579" text-anchor="middle" class="sans" font-size="11" fill="#8F7B68">点击小人查看状态</text>

  <!-- record button -->
  <g>
    <rect x="38" y="724" width="314" height="62" rx="18" fill="#2B1B14" stroke="#6A432F"/>
    <rect x="45" y="731" width="300" height="48" rx="14" fill="#D16A43"/>
    <rect x="45" y="731" width="300" height="12" rx="10" fill="#F0A64A" opacity="0.34"/>
    <text x="195" y="762" text-anchor="middle" class="sans" font-size="18" font-weight="700" fill="#FFF1D6">记录今天训练</text>
  </g>

  <!-- bottom warmth -->
  <rect x="0" y="806" width="390" height="38" fill="#0E0B0A" opacity="0.5"/>
</svg>
