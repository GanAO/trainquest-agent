<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844" role="img" aria-label="TrainQuest Agent Morning Dojo homepage concept">
  <defs>
    <linearGradient id="bgB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#17241D"/>
      <stop offset="0.52" stop-color="#243329"/>
      <stop offset="1" stop-color="#101713"/>
    </linearGradient>
    <linearGradient id="sunB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EFE3C8" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#D8A85C" stop-opacity="0"/>
    </linearGradient>
    <filter id="blurB" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <style>
      .pixel { shape-rendering: crispEdges; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
      .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
  </defs>

  <rect width="390" height="844" fill="url(#bgB)"/>
  <rect x="0" y="0" width="390" height="420" fill="url(#sunB)"/>

  <!-- hamburger -->
  <g transform="translate(24 28)" fill="#AFC7B7" opacity="0.9">
    <rect width="18" height="2" rx="1"/>
    <rect y="7" width="18" height="2" rx="1"/>
    <rect y="14" width="18" height="2" rx="1"/>
  </g>

  <!-- window light -->
  <g opacity="0.9">
    <rect x="252" y="95" width="58" height="74" rx="3" fill="#EFE3C8" opacity="0.2"/>
    <path d="M281 96V169M253 132H309" stroke="#EFE3C8" stroke-opacity="0.28" stroke-width="3"/>
    <path d="M252 170L109 548" stroke="#EFE3C8" stroke-opacity="0.08" stroke-width="46" filter="url(#blurB)"/>
  </g>

  <!-- dojo wall -->
  <g opacity="0.55">
    <rect x="49" y="159" width="292" height="160" rx="6" fill="#1C2A22" stroke="#314637"/>
    <path d="M49 214H341M49 266H341M122 159V319M195 159V319M268 159V319" stroke="#314637" stroke-width="2"/>
  </g>

  <!-- calm props -->
  <g opacity="0.72">
    <rect x="65" y="294" width="44" height="8" rx="4" fill="#0E1511"/>
    <circle cx="73" cy="297" r="9" fill="#0E1511"/>
    <circle cx="101" cy="297" r="9" fill="#0E1511"/>
    <rect x="292" y="279" width="20" height="50" rx="9" fill="#314637"/>
    <circle cx="302" cy="267" r="19" fill="#7BB8A3" opacity="0.45"/>
  </g>

  <!-- top copy -->
  <text x="195" y="112" text-anchor="middle" class="mono" font-size="12" fill="#D8A85C" letter-spacing="1.2">晚上好</text>
  <text x="195" y="134" text-anchor="middle" class="sans" font-size="12" fill="#BFD2C5">今天动一动就很好</text>

  <!-- mat/platform -->
  <ellipse cx="195" cy="552" rx="118" ry="18" fill="#000000" opacity="0.2"/>
  <g class="pixel">
    <rect x="76" y="485" width="238" height="22" fill="#1C2A22"/>
    <rect x="94" y="459" width="202" height="30" fill="#314637"/>
    <rect x="112" y="442" width="166" height="18" fill="#7BB8A3" opacity="0.72"/>
    <rect x="94" y="487" width="202" height="7" fill="#0E1511"/>
    <path d="M112 451H278" stroke="#EFE3C8" stroke-opacity="0.24" stroke-width="3"/>
  </g>

  <!-- pixel avatar -->
  <g class="pixel" transform="translate(151 238) scale(2)">
    <rect x="17" y="4" width="14" height="14" fill="#C68642"/>
    <rect x="16" y="4" width="16" height="5" fill="#2A1D16"/>
    <rect x="20" y="10" width="2" height="2" fill="#121B17"/>
    <rect x="27" y="10" width="2" height="2" fill="#121B17"/>
    <rect x="21" y="16" width="7" height="1" fill="#7C3A3A"/>
    <rect x="18" y="18" width="14" height="22" fill="#D8A85C"/>
    <rect x="14" y="20" width="4" height="20" fill="#C68642"/>
    <rect x="32" y="20" width="4" height="20" fill="#C68642"/>
    <rect x="19" y="40" width="6" height="18" fill="#263229"/>
    <rect x="25" y="40" width="6" height="18" fill="#263229"/>
    <rect x="18" y="58" width="8" height="4" fill="#0F1511"/>
    <rect x="25" y="58" width="8" height="4" fill="#0F1511"/>
  </g>

  <text x="195" y="583" text-anchor="middle" class="sans" font-size="11" fill="#9FB4A7">轻触查看角色状态</text>

  <!-- record button -->
  <g>
    <rect x="40" y="724" width="310" height="62" rx="20" fill="#102018" stroke="#3D5645"/>
    <rect x="48" y="732" width="294" height="46" rx="16" fill="#D8A85C"/>
    <rect x="48" y="732" width="294" height="12" rx="10" fill="#EFE3C8" opacity="0.36"/>
    <text x="195" y="762" text-anchor="middle" class="sans" font-size="18" font-weight="700" fill="#17241D">记录今天训练</text>
  </g>
</svg>
